<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>adarsh</title>
    <script>
      // GitHub Pages SPA redirect
      // Stores the full path in sessionStorage, then redirects to /
      // The index.html script below picks it up and replaces history state
      var l = window.location;
      sessionStorage.setItem(
        'spa-redirect',
        l.pathname.slice(1) + (l.search ? l.search : '') + l.hash
      );
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/');
    </script>
  </head>
  <body></body>
</html>
